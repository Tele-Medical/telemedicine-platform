name: Backend CI

on:
  push:
    branches: [ "main", "feat/*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: telemedicine_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    defaults:
      run:
        working-directory: ./backend

    env:
      DATABASE_URL: postgresql+psycopg://postgres:password@localhost:5432/telemedicine_test
      REDIS_URL: redis://localhost:6379/0
      JWT_SECRET: "super-secret-ci-key-do-not-use-in-prod"
      APP_ENV: testing

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install uv (Python Package Manager)
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version-file: "backend/.python-version"

      - name: Install Dependencies
        run: uv sync --all-extras --dev

      - name: Run Linter (Ruff)
        run: uv run ruff check .

      - name: Run Test Suite (Pytest)
        run: uv run pytest -v
